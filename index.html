<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pojav Tiers - Official Ranking System</title>
  <style>
    /* ==========================================================================
       1. GLOBAL THEME & VARIABLES
       ========================================================================== */
    :root {
      --bg-main: #09090b;
      --bg-card: #111113;
      --bg-border: #1f1f23;
      --text-muted: #4b5563;
      --text-subtitle: #71717a;
      
      /* Colors & Glows */
      --rank-1: #a855f7;          /* Purple */
      --rank-1-glow: rgba(168, 85, 247, 0.4);
      --rank-2: #e4e4e7;          /* White/Silver */
      --rank-3: #f59e0b;          /* Orange/Bronze */
      --score-color: #facc15;      /* Gold/Yellow */
      --tab-active: #ef4444;       /* Bright Red */
      --discord-blue: #5865f2;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-main);
      color: #ffffff;
      font-family: 'Arial Black', 'Impact', sans-serif;
      text-transform: uppercase;
      padding: 15px;
      display: flex;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 450px; /* Mobile Responsive Optmized */
    }

    /* ==========================================================================
       2. TOP NAVBAR (Developer & Discord)
       ========================================================================== */
    .header-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      padding-top: 5px;
    }

    .dev-info {
      display: flex;
      flex-direction: column;
    }

    .dev-title {
      font-size: 10px;
      color: var(--text-subtitle);
      letter-spacing: 1.5px;
    }

    .dev-name {
      font-size: 18px;
      color: #a855f7; /* Purple dev brand name */
      letter-spacing: 0.5px;
    }

    .discord-btn {
      background-color: var(--discord-blue);
      border: none;
      border-radius: 12px;
      width: 45px;
      height: 45px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(88, 101, 242, 0.3);
    }

    .discord-btn svg {
      width: 24px;
      height: 24px;
      fill: #ffffff;
    }

    /* ==========================================================================
       3. LOGO BRANDING (POJAV TIERS)
       ========================================================================== */
    .brand-section {
      text-align: center;
      margin-bottom: 25px;
    }

    .main-logo {
      font-size: 38px;
      font-style: italic;
      letter-spacing: -1px;
      line-height: 1;
    }

    .logo-white {
      color: #ffffff;
    }

    .logo-red {
      color: #ef4444;
    }

    .sub-logo-text {
      font-size: 9px;
      color: var(--text-subtitle);
      letter-spacing: 4px;
      margin-top: 8px;
      font-family: Arial, sans-serif;
      font-weight: bold;
    }

    /* ==========================================================================
       4. NAVIGATION TABS
       ========================================================================== */
    .tab-container {
      display: flex;
      gap: 8px;
      margin-bottom: 15px;
      overflow-x: auto; /* Agar buttons bade ho toh scroll ho jaye */
      padding-bottom: 5px;
    }

    .tab-container::-webkit-scrollbar {
      display: none; /* Hide scrollbar for clean look */
    }

    .tab-btn {
      padding: 10px 20px;
      border-radius: 10px;
      font-weight: bold;
      font-size: 11px;
      cursor: pointer;
      letter-spacing: 0.5px;
      white-space: nowrap;
      border: none;
    }

    .tab-btn.active {
      background-color: var(--tab-active);
      color: #ffffff;
    }

    .tab-btn.inactive {
      background-color: #161619;
      color: var(--text-muted);
      border: 1px solid #222226;
    }

    /* ==========================================================================
       5. SEARCH BAR
       ========================================================================== */
    .search-wrapper {
      position: relative;
      margin-bottom: 25px;
    }

    .search-box {
      width: 100%;
      background-color: #161619;
      border: 1px solid #222226;
      border-radius: 10px;
      padding: 14px 14px 14px 40px;
      color: #ffffff;
      font-size: 12px;
      letter-spacing: 1px;
    }

    .search-box::placeholder {
      color: var(--text-muted);
    }

    .search-icon {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 14px;
    }

    /* ==========================================================================
       6. LEADERBOARD CARDS
       ========================================================================== */
    .leaderboard-card {
      background-color: var(--bg-card);
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 18px;
      border: 1px solid var(--bg-border);
    }

    .category-title {
      font-style: italic;
      font-size: 12px;
      color: #ffffff;
      margin-bottom: 14px;
      letter-spacing: 0.5px;
    }

    /* Row Base Style */
    .player-row {
      display: flex;
      align-items: center;
      background: linear-gradient(90deg, rgba(25, 25, 28, 0.7) 0%, rgba(17, 17, 19, 0) 100%);
      border-radius: 10px;
      padding: 12px;
      position: relative;
      overflow: hidden;
    }

    .player-row::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 4px;
    }

    .player-avatar {
      width: 42px;
      height: 42px;
      border-radius: 4px;
      margin-right: 12px;
      background-color: #27272a;
      image-rendering: pixelated; 
    }

    .subtitle {
      font-size: 9px;
      color: var(--text-subtitle);
      display: block;
      margin-top: 1px;
    }

    /* ==========================================================================
       7. RANK SPECIFIC (Purple, Silver, Bronze Variations)
       ========================================================================== */

    /* --- RANK #1 --- */
    .rank-1-row::before {
      background-color: var(--rank-1);
      box-shadow: 0 0 12px var(--rank-1);
    }
    .rank-1-num {
      color: var(--rank-1);
      font-size: 18px;
      margin-right: 12px;
      min-width: 28px;
    }
    .rank-1-name {
      color: var(--rank-1);
      font-size: 15px;
      text-shadow: 0 0 8px var(--rank-1-glow);
    }
    .rank-1-score {
      color: var(--score-color);
      margin-left: auto;
      font-size: 18px;
    }

    /* --- RANK #2 --- */
    .rank-2-row::before {
      background-color: var(--rank-2);
    }
    .rank-2-num {
      color: var(--text-subtitle);
      font-size: 18px;
      margin-right: 12px;
      min-width: 28px;
    }
    .rank-2-name {
      color: var(--rank-2);
      font-size: 15px;
    }
    .rank-2-score {
      color: var(--score-color);
      margin-left: auto;
      font-size: 18px;
    }

    /* --- RANK #3 --- */
    .rank-3-row::before {
      background-color: var(--rank-3);
    }
    .rank-3-num {
      color: var(--rank-3);
      font-size: 18px;
      margin-right: 12px;
      min-width: 28px;
    }
    .rank-3-name {
      color: var(--rank-3);
      font-size: 15px;
    }
    .rank-3-score {
      color: var(--score-color);
      margin-left: auto;
      font-size: 18px;
    }
  </style>
</head>
<body>

  <div class="container">
    
    <!-- Top Nav (Developer Info & Discord) -->
    <div class="header-nav">
      <div class="dev-info">
        <span class="dev-title">DEVELOPER</span>
        <span class="dev-name">ANKITCRAFTFIRE</span>
      </div>
      <button class="discord-btn" aria-label="Discord">
        <!-- Official Discord Icon SVG -->
        <svg viewBox="0 0 127.14 96.36">
          <path d="M107.7,8.07A105.15,105.15,0,0,0,77.26,0a77.19,77.19,0,0,0-3.3,6.83A96.67,96.67,0,0,0,53.22,6.83,77.19,77.19,0,0,0,49.88,0,105.15,105.15,0,0,0,19.44,8.07C3.66,31.58-1.86,54.65,1,77.53A105.73,105.73,0,0,0,32,96.36a74.37,74.37,0,0,0,6.72-10.93,68.6,68.6,0,0,1-10.64-5.12c.91-.67,1.81-1.37,2.65-2.1a75.22,75.22,0,0,0,72.94,0c.84.73,1.74,1.43,2.65,2.1a68.6,68.6,0,0,1-10.64,5.12,74.37,74.37,0,0,0,6.72,10.93,105.73,105.73,0,0,0,31.55-18.83C129.91,50.15,123.75,27.35,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53S36.18,40.36,42.45,40.36,53.92,46,53.92,53,48.72,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.24,60,73.24,53S78.41,40.36,84.69,40.36,96.16,46,96.16,53,91,65.69,84.69,65.69Z"/>
        </svg>
      </button>
    </div>

    <!-- Branding Section Logo -->
    <div class="brand-section">
      <h1 class="main-logo"><span class="logo-white">POJAV</span><span class="logo-red">TIERS</span></h1>
      <div class="sub-logo-text">OFFICIAL RANKING SYSTEM</div>
    </div>
    
    <!-- Tabs Menu -->
    <div class="tab-container">
      <button class="tab-btn active">Overall</button>
      <button class="tab-btn inactive">Netherite Pot</button>
      <button class="tab-btn inactive">Diamond Pot</button>
    </div>

    <!-- Search Input Area -->
    <div class="search-wrapper">
      <span class="search-icon">🔍</span>
      <input type="text" class="search-box" placeholder="SEARCH PLAYER...">
    </div>

    <!-- Category 1: Combat Master -->
    <div class="leaderboard-card">
      <div class="category-title">Combat Master</div>
      <div class="player-row rank-1-row">
        <div class="rank-1-num">#1</div>
        <img class="player-avatar" src="https://minotar.net/avatar/Steve/42" alt="Steve Face">
        <div>
          <span class="rank-1-name">DEVIL_PLAYS2010</span>
          <span class="subtitle">AS</span>
        </div>
        <div class="rank-1-score">163</div>
      </div>
    </div>

    <!-- Category 2: Combat Ace -->
    <div class="leaderboard-card">
      <div class="category-title">Combat Ace</div>
      
      <!-- Rank #2 Player -->
      <div class="player-row rank-2-row" style="margin-bottom: 10px;">
        <div class="rank-2-num">#2</div>
        <img class="player-avatar" src="https://minotar.net/avatar/Herobrine/42" alt="Herobrine Face">
        <div>
          <span class="rank-2-name">CurzClaps</span>
          <span class="subtitle">AS</span>
        </div>
        <div class="rank-2-score">125</div>
      </div>

      <!-- Rank #3 Player -->
      <div class="player-row rank-3-row">
        <div class="rank-3-num">#3</div>
        <img class="player-avatar" src="https://minotar.net/avatar/Alex/42" alt="Alex Face">
        <div>
          <span class="rank-3-name">Icykrish</span>
          <span class="subtitle">AS</span>
        </div>
        <div class="rank-3-score">98</div>
      </div>
    </div>

  </div>

</body>
  </html>
